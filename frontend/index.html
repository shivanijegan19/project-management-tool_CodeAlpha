<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in - TaskBoard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to see your project boards.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" />

        <button type="submit" class="btn btn-full">Log in</button>
      </form>

      <div class="error-msg" id="error-box"></div>

      <p class="auth-foot">No account yet? <a href="register.html">Create one</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-box");

    // If already logged in, skip straight to the dashboard
    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await apiRequest("/auth/login", {
          method: "POST",
          body: { email, password },
        });

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify({ _id: data._id, name: data.name, email: data.email }));
        window.location.href = "dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up - TaskBoard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="sub">Start organizing projects with your team.</p>

      <form id="register-form">
        <label for="name">Full name</label>
        <input type="text" id="name" required placeholder="Priya Sharma" />

        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" />

        <button type="submit" class="btn btn-full">Sign up</button>
      </form>

      <div class="error-msg" id="error-box"></div>

      <p class="auth-foot">Already have an account? <a href="index.html">Log in</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById("register-form");
    const errorBox = document.getElementById("error-box");

    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await apiRequest("/auth/register", {
          method: "POST",
          body: { name, email, password },
        });

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify({ _id: data._id, name: data.name, email: data.email }));
        window.location.href = "dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
